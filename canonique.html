<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <link rel="icon" type="mathAttack/png" href="medias/mathAttack.png">
    <title>Math Attaque - Jeu</title>
    <link rel="stylesheet" href="style.css">
    <!--https://www.w3schools.com/jsref/met_audio_play.asp -->
    <audio id="explosion">
        <source src="explosion.mp3" type="audio/mpeg">
    </audio>
    <audio id="tir">
        <source src="tir.mp3" type="audio/mpeg">
    </audio>
</head>
<body>
    <!-- Canvas sur lequel on dessine la grille et la parabole -->
    <canvas id="myCanvas"></canvas>

    <!-- Nom du joueur récupéré localStorage -->
    <h2 id="usernameDisplay"></h2><br>

    <!-- Niveau actuel mis a jour par levelCounter() -->
    <p id="level">Niveau: 1</p>

    <!-- Panneau d'entree de la parabole forme canonique : Y = aX² + hX + k -->
    <div id="ui-panel">
        <h1>Entrer votre parabole</h1>
        <div class="equation-row">
            Y =
            <input type="text" id="a" placeholder="a" class="abc">
            (X- +
            <input type="text" id="h" placeholder="h" class="abc">
            )^2 +  +
            <input type="text" id="k" placeholder="k" class="abc">
            <!-- Declenche lancer() dans gameCanonique.js -->
            <input type="button" id="btnSoumet" onclick="lancer()" value="TIRER" class="tir">
        </div>
        <!--HIT, Miss, erreur -->
        <div id="divAffiche"></div>
    </div>

    <!-- Musique-->
    <audio autoplay loop muted id="bg-music">
        <source src="medias/background.mp4" type="audio/mp4">
        Your browser does not support the audio element.
    </audio>

    <!-- Compteur de tirs mis a jour par mettreAJourTirs() -->
    <p id="tirs-restants">Tirs : 5 / 5</p>

    <script src="gameCanonique.js"></script>
    <script src="name.js"></script>
</body>
</html>
