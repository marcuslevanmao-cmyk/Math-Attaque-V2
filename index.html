<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="mathAttack/png" href="medias/mathAttack.png">
    <title>Math Attaque</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Écran d'intro : affiche opening.mp4 puis loading.mp4 avant de rediriger -->
    <div class="screen" id="introScreen">
        <div class="grid"></div>
        <!-- Vidéo d'ouverture — visible en premier -->
        <video id="opening" muted playsinline preload="auto" src="medias/Opening_Scene.mp4"></video>
        <!-- Écran de chargement — caché jusqu'à ce que opening se termine -->
        <video id="loading" muted playsinline preload="auto" hidden src="medias/Loading_screen.mp4"></video>
    </div>
    <!-- intro.js gère l'enchaînement des vidéos et la redirection -->
    <script src="intro.js"></script>
</body>
</html>
