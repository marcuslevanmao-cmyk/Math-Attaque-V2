<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="mathAttack/png" href="medias/mathAttack.png">
  <title>Math Attaque - Home</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
  <script src="music.js"></script>
<body>
  <div class="grid"></div>
  <div class="home-bg"></div>
  <div class="home-overlay"></div>
  <a id="instructions-btn" href="Instruction.html">? Instructions</a>

  <div class="home-content">

    <div class="logo">Math&nbsp;Att<span class="star">✦</span>que</div>
    <div class="logo-underline"></div>
  <h2 id="highScoreDisplay"></h2>
    <div class="username-row">
      <label for="username-input">Joueur:</label>
      <input id="username-input" type="text" placeholder="Entrer votre nom" maxlength="20">
      <input type="button" id="btnNomSoum" onclick="nouveauNom()" value="SOUMETTRE" class="tir">
    </div>
    <br>
    <!-- Boutons de niveau -->
    <div id="niveau" style="display: none;">
      <div class="levelSel"><a href="gameGenerale.html">Forme generale</a></div>
      <br>
      <div class="levelSel"><a href="canonique.html">Forme Canonique</a></div>
      <br>
      <div class="levelSel"><a href="factorisée.html">Forme factorisé</a></div>
    </div>
    <br>
    <!--Leaderboard — le <tbody> est rempli automatiquement par homepage.js.
      Structure : <table> > <thead> (titres) + <tbody> (donnees)
      https://www.w3schools.com/html/html_tables.asp-->
    <div id="leaderboard-section">
      <h3>MEILLEURS SCORES</h3>
      <table id="leaderboard-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Joueur</th>
            <th>Niveau</th>
          </tr>
        </thead>
        <tbody id="leaderboard-body">
          <!-- Rempli par homepage.js -->
        </tbody>
      </table>
    </div>

  </div>

  <script src="homepage.js"></script>
  <script src="name.js"></script>
  <script src="gameGenerale.js"></script>

</body>
</html>
